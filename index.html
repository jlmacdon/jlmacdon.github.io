<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quarto</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="//www.parsecdn.com/js/parse-1.6.14.min.js"></script>
    <script>
        Parse.initialize("mPKfUqcy5ZbCPGvADjU7zGYRJFipKS6SIokZAu3W", "BOKeYCBacfuiQoEKcZVWblnB9J503gzM32tosNUy");
    </script>
</head>
<body>
<div class="center">
    <div class="container">
        <div>Welcome to the experiment!</div>
        <div>Please type in your name and age below:</div>
        <form>
            Name:<br>
            <input type="text" id="username"><br>
            Age:<br>
            <input type="text" id="age"><br>
            <div class="center">
                <button onclick="saveParticipantData()">
                    <a href="instructions.html">Enter</a>
                </button>
            </div>
        </form>
    </div>
    <script>
     alert("hi");
    function saveParticipantData() {
        var Participant = Parse.Object.extend("Participant");
        var participant = new Participant;

        var username = document.getElementById("username");
        var age = document.getElementById("age");
        participant.set("username", username);
        participant.set("age", age);

        participant.save({username: username, age: age}).then(function(object) {
            alert("yay! it worked");
        });
    }
    </script>
</div>
</body>
</html>
