<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quarto</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="//www.parsecdn.com/js/parse-1.6.14.min.js"></script>
</head>
<body>
<script>
    function checkFieldsFilled () {
        if(document.getElementById("workerID").value.length > 0 && document.getElementById("age").value.length > 0) {
            saveParticipantData();
            window.location.href = "instructions.html";
            return false;
        }
        else {
            alert("Please fill out both fields with the appropriate information!");
        }
    }
    function saveParticipantData() {
        Parse.initialize("mPKfUqcy5ZbCPGvADjU7zGYRJFipKS6SIokZAu3W", "BOKeYCBacfuiQoEKcZVWblnB9J503gzM32tosNUy");
        var Participant = Parse.Object.extend("Participant");
        var participant = new Participant();
        var workerID = document.getElementById("workerID").value;
        var userAge = document.getElementById("age").value;
        participant.save({workerID: workerID, age: userAge}).then(function (object) {});
        localStorage.globalWorkerID = workerID;
    }
</script>
<div class="center">
    <div class="container">
        <div>Welcome to the experiment!</div>
        <div>Please type in your MTurk Worker ID and age below:</div><br>
        <div class="form-field">
            MTurk Worker ID:<br>
            <input class="text-field" type="text" id="workerID"><br>
            Age:<br>
            <input class="text-field" type="text" id="age"><br>
            <div class="center">
                <button id="enter-exit-button" class="button" onclick="checkFieldsFilled()">Enter</button>
            </div>
        </div>
    </div>
</div>
<script>
    window.open();
    window.onkeypress = function(event) {
        if (event.keyCode == 13) {
            checkFieldsFilled();
        }
    }
</script>
</body>
</html>
