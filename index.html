<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quarto</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="//www.parsecdn.com/js/parse-1.6.14.min.js"></script>
</head>
<body>
<script>
    function saveParticipantData() {
        Parse.initialize("mPKfUqcy5ZbCPGvADjU7zGYRJFipKS6SIokZAu3W", "BOKeYCBacfuiQoEKcZVWblnB9J503gzM32tosNUy");

        var Participant = Parse.Object.extend("Participant");
        var participant = new Participant();
        var workerID = document.getElementById("workerID").value;
        var userAge = document.getElementById("age").value;
        participant.save({workerID: workerID, age: userAge}).then(function (object) {});

        localStorage.globalWorkerID = workerID;
    }

</script>
<div class="center">
    <div class="container">
        <div>Welcome to the experiment!</div>
        <div>Please type in your MTurk Worker ID and age below:</div>
        <form action = "">
        <fieldset>
            MTurk Worker ID:<br>
            <input type="text" id="workerID"><br>
            Age:<br>
            <input type="text" id="age"><br>
            <div class="center">
                <button onclick=saveParticipantData()>
                    <a href="instructions.html">Enter</a>
                </button>
            </div>
        </fieldset>    
        </form>
    </div>
</div>
</body>
</html>
